<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Ember Clone (As-Is 재현)</title>
  </head>
  <body>
    <!-- 옛 Ember 1.5는 jQuery + Handlebars 1.3이 짝으로 필요 (순서 중요) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/1.3.0/handlebars.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ember.js/1.5.0/ember.prod.js"></script>

    <!-- 화면 템플릿: Ember가 이 <script>를 자동으로 읽어 'application' 화면으로 씀 -->
    <script type="text/x-handlebars">
      <h1>수신 적금 미니플로우</h1>
      <div id="navibar"></div>
      {{outlet}}
    </script>

    <script type="text/x-handlebars" data-template-name="m010000">
      <h2>① 상품약관확인 (m010000)</h2>
      <button {{action goNext}}>다음</button>
    </script>

    <script type="text/x-handlebars" data-template-name="m014000">
      <h2>② 적금신청서 (m014000)</h2>
      <p>선택하신 상품: <strong>{{productName}}</strong></p>
      <button {{action goPrev}}>이전</button>
      <button {{action goNext}}>다음</button>
    </script>

    <script type="text/x-handlebars" data-template-name="m033000">
      <h2>③ 가입완료 (m033000)</h2>
      <button {{action goPrev}}>이전</button>
    </script>

    <script type="text/x-handlebars" data-template-name="p00000007">
      <h2>동의서등록 (정기적금)</h2>
      <table border="1">
        <thead>
          <tr><th>NO</th><th>동의서명</th><th>동의여부</th></tr>
        </thead>
        <tbody>
          {{#each item in agreeList}}
          <tr>
            <td>{{item.no}}</td>
            <td>{{item.name}}</td>
            <td>
              {{radio-button name=item.no value="Y" groupValue=item.agree}} Y
              {{radio-button name=item.no value="N" groupValue=item.agree}} N
            </td>
          </tr>
          {{/each}}
        </tbody>
      </table>
    </script>

    <!-- 내 코드 -->
    <script src="js/app.js"></script>
    <script src="js/common/model/flowModel.js"></script>
    <script src="js/router.js"></script>
    <script src="js/modules/td/m010000/m010000Controller.js"></script>
    <script src="js/modules/td/m014000/m014000Controller.js"></script>
    <script src="js/modules/td/m033000/m033000Controller.js"></script>
    <script src="js/common/navigation/navigationData.js"></script>
    <script src="js/common/navigation/navigationBar.js"></script>
    <script src="js/common/base/baseView.js"></script>
    <script src="js/modules/td/m010000/m010000View.js"></script>
    <script src="js/modules/td/m014000/m014000View.js"></script>
    <script src="js/modules/td/m033000/m033000View.js"></script>
    <script src="js/modules/po/cp/P00000007/p00000007Controller.js"></script>
    <script src="js/common/component/radioButton.js"></script>
  </body>
</html>
